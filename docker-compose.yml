
services:
  api:
    build: .
    container_name: flight-prediction-api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=flight_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./utils:/app/utils
    depends_on:
      - db
    networks:
      - flight_net

  db:
    image: postgres:14-alpine
    container_name: flight_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flight_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:

networks:
  flight_net:
    driver: bridge