repos:
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language: system

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python import sorting)
        args: ["--profile", "black"]
        language: system

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.5.2
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-find]
        stages: [commit]
        language: system

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]
        stages: [commit]
        language: system